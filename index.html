<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hirokaka Orica Maker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<!-- 上部メニュー -->
<header class="topbar">

    <div class="logo">
        Hirokakapresents
    </div>

    <div class="menu-buttons">

        <button id="savePNG">
            PNG保存
        </button>

        <button id="saveJPG">
            JPG保存
        </button>

        <button id="saveJSON">
            JSON保存
        </button>

        <button id="loadJSON">
            JSON読込
        </button>

    </div>

</header>

<!-- メイン -->
<div class="main-layout">

    <!-- 編集エリア -->
    <aside class="editor">

        <!-- 基本 -->
        <section id="panel-basic" class="panel active">

            <h2>基本情報</h2>

            <label>カード名</label>
            <input type="text" id="cardName">

            <label>カード番号</label>
            <input type="text" id="cardNumber">

            <label>作者名</label>
            <input type="text" id="creator">

        </section>

        <!-- 画像 -->
        <section id="panel-image" class="panel">

            <h2>画像設定</h2>

            <input
            type="file"
            id="imageUpload"
            accept="image/*">

            <label>ズーム</label>

            <input
            type="range"
            id="imageZoom"
            min="50"
            max="300"
            value="100">

        </section>

        <!-- フレーム -->
        <section id="panel-frame" class="panel">

            <h2>フレーム</h2>

            <select id="frameSelect">

                <option value="water">
                    水
                </option>

                <option value="fire">
                    火
                </option>

                <option value="nature">
                    自然
                </option>

                <option value="dark">
                    闇
                </option>

                <option value="light">
                    光
                </option>

                <option value="rainbow">
                    虹
                </option>

                <option value="space">
                    宇宙
                </option>

            </select>

        </section>

        <!-- 星 -->
        <section id="panel-star" class="panel">

            <h2>星設定</h2>

            <input
            type="range"
            id="starCount"
            min="0"
            max="5"
            value="0">

        </section>

        <!-- 効果 -->
        <section id="panel-effect" class="panel">

            <h2>効果欄</h2>

            <textarea
            id="effectText"></textarea>

            <label>
                文字サイズ
            </label>

            <input
            type="range"
            id="effectSize"
            min="14"
            max="36"
            value="22">

        </section>

        <!-- レア -->
        <section id="panel-rarity" class="panel">

            <h2>レアリティ</h2>

            <select id="rarity">

                <option>なし</option>
                <option>N</option>
                <option>R</option>
                <option>SR</option>
                <option>SSR</option>
                <option>UR</option>
                <option>LR</option>

            </select>

            <label>
                ホログラム
            </label>

            <input
            type="checkbox"
            id="holo">

        </section>

    </aside>

    <!-- プレビュー -->
    <main class="preview">

        <div id="card" class="card">

            <div id="cardNameDisplay"
                 class="card-name">
                カード名
            </div>

            <div id="stars"
                 class="stars">
            </div>

            <div class="art-area">

                <img id="cardImage">

            </div>

            <div id="effectDisplay"
                 class="effect-box">
            </div>

            <div id="rarityDisplay"
                 class="rarity">
            </div>

            <div id="numberDisplay"
                 class="number">
            </div>

            <div id="creatorDisplay"
                 class="creator">
            </div>

        </div>

    </main>

</div>

<!-- 下タブ -->
<nav class="bottom-tabs">

    <button data-panel="basic">
        基本
    </button>

    <button data-panel="image">
        画像
    </button>

    <button data-panel="frame">
        フレーム
    </button>

    <button data-panel="star">
        星
    </button>

    <button data-panel="effect">
        効果
    </button>

    <button data-panel="rarity">
        レア
    </button>

</nav>

<script src="script.js"></script>

</body>
</html>
