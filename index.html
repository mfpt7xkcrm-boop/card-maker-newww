<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリカメーカー V完成版</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- 画像保存用 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>

<!-- ======================
      上部メニュー
====================== -->

<header class="topbar">

    <div class="logo">
        ORICA MAKER
    </div>

    <div class="header-buttons">

        <button id="savePNG">
            PNG保存
        </button>

        <button id="saveJPG">
            JPG保存
        </button>

        <button id="saveJSON">
            データ保存
        </button>

        <button id="loadJSONBtn">
            データ読込
        </button>

        <input 
            type="file"
            id="loadJSON"
            accept=".json"
            hidden>

    </div>

</header>


<!-- ======================
        本体
====================== -->

<div class="app">


<!-- ======================
        編集欄
====================== -->

<aside class="editor">


<!-- 名前 -->

<section id="panel-name"
         class="panel active">

<h2>カード名</h2>

<label>
名前
</label>

<input 
type="text"
id="cardName"
placeholder="カード名">


<label>
文字サイズ
</label>

<input
type="range"
id="nameSize"
min="20"
max="80"
value="52">


<label>
文字色
</label>

<input 
type="color"
id="nameColor"
value="#ffffff">


<label>
ふち色
</label>

<input
type="color"
id="outlineColor"
value="#000000">


</section>



<!-- 画像 -->

<section 
id="panel-image"
class="panel">

<h2>画像</h2>


<label>
カード画像
</label>

<input
type="file"
id="imageUpload"
accept="image/*">


<p class="panel-note">
画像を選択すると自動で中央トリミングされます。
保存時も同じ表示になります。
</p>


</section>



<!-- フレーム -->

<section
id="panel-frame"
class="panel">


<h2>
フレーム
</h2>


<label>
種類
</label>


<select id="frameCategory">

<option value="basic">
基本フレーム
</option>


<option value="premium">
特別フレーム
</option>

</select>


<label>
デザイン
</label>


<select id="frameSelect">

</select>


<label>
ホログラム
</label>


<label>

<input
type="checkbox"
id="holo">

ホログラムを付ける

</label>


</section>




<!-- 星 -->

<section
id="panel-star"
class="panel">


<h2>
レア度（星）
</h2>


<label>
星の数
</label>


<input
type="range"
id="starCount"
min="0"
max="5"
value="0">


<p class="panel-note">

1〜4：ポップ星<br>
5：虹色パステル星

</p>


</section>





<!-- 説明 -->

<section
id="panel-text"
class="panel">


<h2>
説明文
</h2>


<label>
能力説明
</label>


<textarea
id="effectText"
placeholder="能力を書く">
</textarea>


<label>
文字サイズ
</label>


<input
type="range"
id="effectSize"
min="12"
max="30"
value="20">


<hr>


<label>

<input
type="checkbox"
id="showFlavor"
checked>

フレーバーテキスト表示

</label>



<label>
フレーバー
</label>


<textarea
id="flavorText"
placeholder="カードのセリフや設定">
</textarea>


<label>
フレーバー文字サイズ
</label>


<input
type="range"
id="flavorSize"
min="10"
max="24"
value="14">


<label>
フォント
</label>


<select id="flavorFont">


<option value="mincho">
明朝
</option>


<option value="gothic">
ゴシック
</option>


<option value="serif">
英字風
</option>


</select>


</section>




<!-- 情報 -->

<section
id="panel-info"
class="panel">


<h2>
カード情報
</h2>


<label>
カード番号
</label>


<input
type="text"
id="cardNumber"
placeholder="001">


<label>
作者名
</label>


<input
type="text"
id="creator"
placeholder="Creator">


<label>
レアリティ
</label>


<select id="rarity">


<option value="">
なし
</option>


<option value="N">
N
</option>


<option value="R">
R
</option>


<option value="SR">
SR
</option>


<option value="SSR">
SSR
</option>


<option value="UR">
UR
</option>


<option value="LR">
LR
</option>


</select>


</section>



</aside>




<!-- ======================
        カード表示
====================== -->


<main class="preview">


<div id="card"
class="card frame-water">


<div id="holoLayer"
class="holo-layer">
</div>



<div 
id="cardNameDisplay"
class="card-name">

カード名

</div>


<div
id="stars"
class="stars">
</div>


<div class="content-panel">


<div class="art-area">

<img 
id="cardImage"
alt="カード画像">


</div>



<div class="text-area">


<div
id="effectDisplay"
class="effect-main">
</div>


<div
id="flavorDivider"
class="flavor-divider">
</div>


<div
id="flavorDisplay"
class="effect-flavor">
</div>


</div>


</div>


<div
id="rarityDisplay"
class="rarity">
</div>



<div
id="numberDisplay"
class="number">
</div>


<div
id="creatorDisplay"
class="creator">
</div>


</div>


</main>


</div>




<!-- ======================
        下タブ
====================== -->


<nav class="bottom-nav">


<button 
class="active"
data-panel="name">

名前

</button>


<button data-panel="image">
画像
</button>


<button data-panel="frame">
枠
</button>


<button data-panel="star">
星
</button>


<button data-panel="text">
説明
</button>


<button data-panel="info">
情報
</button>


</nav>



<!-- JS -->
<script src="script.js"></script>


</body>
</html>
